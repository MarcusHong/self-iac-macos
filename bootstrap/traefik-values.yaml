# ================================================
# Traefik Helm Values
# TLS мў…л‹Ё + HTTPв†’HTTPS л¦¬л‹¤мќґл ‰нЉё
# ================================================

service:
  type: LoadBalancer

ports:
  web:
    port: 80
  websecure:
    port: 443

# HTTPв†’HTTPS л¦¬л‹¤мќґл ‰нЉё
additionalArguments:
  - --entryPoints.web.http.redirections.entryPoint.to=websecure
  - --entryPoints.web.http.redirections.entryPoint.scheme=https

tlsStore:
  default:
    defaultCertificate:
      secretName: tailscale-tls

ingressRoute:
  dashboard:
    enabled: false

resources:
  requests:
    cpu: 100m
    memory: 128Mi
  limits:
    cpu: 500m
    memory: 256Mi
